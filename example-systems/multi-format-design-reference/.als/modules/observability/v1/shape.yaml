dependencies: []

entities:
  dashboard:
    source_format: markdown
    path: dashboards/{id}.md

    identity:
      id_field: id

    fields:
      id:
        type: id
        allow_null: false

      title:
        type: string
        allow_null: false

      stream_ref:
        type: ref
        allow_null: false
        target:
          module: observability
          entity: metric-stream

    body:
      title:
        source:
          kind: field
          field: title

      sections:
        - name: SUMMARY
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
          guidance:
            include: what the dashboard tracks and why the linked stream matters
            exclude: raw sample rows

        - name: WATCHPOINTS
          allow_null: false
          content:
            mode: freeform
            blocks:
              bullet_list: {}
              paragraph: {}
          guidance:
            include: the operational checks tied to the linked stream
            exclude: schema-level detail already enforced by the JSONL entity

  metric-stream:
    source_format: jsonl
    path: streams/{id}.jsonl

    rows:
      fields:
        observed_at:
          type: string
          allow_null: false

        metric:
          type: enum
          allow_null: false
          allowed_values: [latency_ms]

        window:
          type: enum
          allow_null: false
          allowed_values: [p50, p95, p99]

        value:
          type: number
          allow_null: false

        tags:
          type: list
          allow_null: false
          items:
            type: enum
            allowed_values: [api-gateway, baseline, canary]
