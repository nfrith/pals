phases: [intake, planning, implementation, deployment, closed]

states:
  draft:
    initial: true
    phase: intake
    actor: operator
  queued:
    phase: intake
    actor: agent
    agent: queued
  planning:
    phase: planning
    actor: agent
    agent: planning
  plan-input:
    phase: planning
    actor: operator
  plan-ready:
    phase: planning
    actor: operator
  ready:
    phase: implementation
    actor: agent
    agent: ready
  in-dev:
    phase: implementation
    actor: agent
    agent: in-dev
  in-review:
    phase: implementation
    actor: agent
    agent: in-review
  uat-test:
    phase: implementation
    actor: operator
  deployment-ready:
    phase: deployment
    actor: agent
    agent: deployment-ready
  deploying:
    phase: deployment
    actor: agent
    agent: deploying
  deployment-testing:
    phase: deployment
    actor: agent
    agent: deployment-testing
  deployment-failure:
    phase: deployment
    actor: operator
  completed:
    phase: closed
    terminal: true
  deferred:
    phase: closed
    terminal: true
  cancelled:
    phase: closed
    terminal: true

agents:
  queued:
    path: delamains/delivery/agents/queued.md
  planning:
    path: delamains/delivery/agents/planning.md
  ready:
    path: delamains/delivery/agents/ready.md
  in-dev:
    path: delamains/delivery/agents/in-dev.md
  in-review:
    path: delamains/delivery/agents/in-review.md
  deployment-ready:
    path: delamains/delivery/agents/deployment-ready.md
  deploying:
    path: delamains/delivery/agents/deploying.md
  deployment-testing:
    path: delamains/delivery/agents/deployment-testing.md

transitions:
  - id: draft-to-queued
    class: advance
    from: draft
    to: queued
  - id: queued-to-planning
    class: advance
    from: queued
    to: planning
  - id: planning-to-plan-input
    class: advance
    from: planning
    to: plan-input
  - id: planning-to-plan-ready
    class: advance
    from: planning
    to: plan-ready
  - id: plan-input-to-queued
    class: rework
    from: plan-input
    to: queued
  - id: plan-ready-to-ready
    class: advance
    from: plan-ready
    to: ready
  - id: plan-ready-to-queued
    class: rework
    from: plan-ready
    to: queued
  - id: ready-to-in-dev
    class: advance
    from: ready
    to: in-dev
  - id: in-dev-to-in-review
    class: advance
    from: in-dev
    to: in-review
  - id: in-review-to-ready
    class: rework
    from: in-review
    to: ready
  - id: in-review-to-uat-test
    class: advance
    from: in-review
    to: uat-test
  - id: uat-test-to-deployment-ready
    class: advance
    from: uat-test
    to: deployment-ready
  - id: uat-test-to-queued
    class: rework
    from: uat-test
    to: queued
  - id: deployment-ready-to-deploying
    class: advance
    from: deployment-ready
    to: deploying
  - id: deploying-to-deployment-testing
    class: advance
    from: deploying
    to: deployment-testing
  - id: deployment-testing-to-completed
    class: exit
    from: deployment-testing
    to: completed
  - id: deployment-testing-to-deployment-failure
    class: rework
    from: deployment-testing
    to: deployment-failure
  - id: deployment-failure-to-ready
    class: rework
    from: deployment-failure
    to: ready
  - id: deployment-failure-to-queued
    class: rework
    from: deployment-failure
    to: queued
  - id: any-to-deferred
    class: exit
    from:
      - draft
      - queued
      - planning
      - plan-input
      - plan-ready
      - ready
      - in-dev
      - in-review
      - uat-test
      - deployment-ready
      - deployment-failure
    to: deferred
  - id: any-to-cancelled
    class: exit
    from:
      - draft
      - queued
      - planning
      - plan-input
      - plan-ready
      - ready
      - in-dev
      - in-review
      - uat-test
      - deployment-ready
      - deployment-failure
    to: cancelled
