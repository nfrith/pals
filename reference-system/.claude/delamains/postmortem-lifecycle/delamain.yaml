phases:
  - investigation
  - remediation
  - closure
states:
  investigating:
    initial: true
    phase: investigation
    actor: agent
    path: agents/investigating.md
    resumable: false
  mitigated:
    phase: remediation
    actor: agent
    path: agents/mitigated.md
    resumable: false
  resolved:
    phase: remediation
    actor: agent
    path: agents/resolved.md
    resumable: false
  closed:
    terminal: true
    phase: closure
transitions:
  - class: advance
    from: investigating
    to: mitigated
  - class: advance
    from: mitigated
    to: resolved
  - class: rework
    from: mitigated
    to: investigating
  - class: rework
    from: resolved
    to: mitigated
  - class: exit
    from: resolved
    to: closed
