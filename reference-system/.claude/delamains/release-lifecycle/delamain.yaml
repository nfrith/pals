phases:
  - deployment
  - steady-state
  - closed
states:
  pending:
    initial: true
    phase: deployment
    actor: agent
    path: agents/pending.md
    resumable: false
  rolling-out:
    phase: deployment
    actor: agent
    path: agents/rolling-out.md
    resumable: false
  active:
    phase: steady-state
    actor: agent
    path: agents/active.md
    resumable: false
  rolled-back:
    terminal: true
    phase: closed
  superseded:
    terminal: true
    phase: closed
transitions:
  - class: advance
    from: pending
    to: rolling-out
  - class: advance
    from: rolling-out
    to: active
  - class: rework
    from: rolling-out
    to: pending
  - class: exit
    from: active
    to: rolled-back
  - class: exit
    from: active
    to: superseded
