phases:
  - response
  - stabilization
  - closure
states:
  active:
    initial: true
    phase: response
    actor: agent
    provider: anthropic
    path: agents/active.md
    resumable: false
  monitoring:
    phase: stabilization
    actor: agent
    provider: anthropic
    path: agents/monitoring.md
    resumable: false
  recovered:
    phase: stabilization
    actor: agent
    provider: anthropic
    path: agents/recovered.md
    resumable: false
  closed:
    terminal: true
    phase: closure
transitions:
  - class: advance
    from: active
    to: monitoring
  - class: advance
    from: monitoring
    to: recovered
  - class: rework
    from: monitoring
    to: active
  - class: rework
    from: recovered
    to: monitoring
  - class: exit
    from: recovered
    to: closed
