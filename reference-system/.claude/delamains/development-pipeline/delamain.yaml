phases:
  - intake
  - planning
  - implementation
  - deployment
  - closed
states:
  draft:
    initial: true
    phase: intake
    actor: operator
  queued:
    phase: intake
    actor: agent
    path: agents/queued.md
    resumable: false
  planning:
    phase: planning
    actor: agent
    path: agents/planning.md
    resumable: true
    delegated: true
    session-field: planner_session
  plan-input:
    phase: planning
    actor: operator
  plan-ready:
    phase: planning
    actor: operator
  ready:
    phase: implementation
    actor: agent
    path: agents/ready.md
    resumable: false
  in-dev:
    phase: implementation
    actor: agent
    path: agents/in-dev.md
    resumable: true
    session-field: dev_session
    sub-agent: sub-agents/developer.md
  in-review:
    phase: implementation
    actor: agent
    path: agents/in-review.md
    resumable: false
  uat-test:
    phase: implementation
    actor: operator
  deployment-ready:
    phase: deployment
    actor: agent
    path: agents/deployment-ready.md
    resumable: false
  deploying:
    phase: deployment
    actor: agent
    path: agents/deploying.md
    resumable: false
  deployment-testing:
    phase: deployment
    actor: agent
    path: agents/deployment-testing.md
    resumable: false
  deployment-failure:
    phase: deployment
    actor: operator
  completed:
    terminal: true
    phase: closed
  deferred:
    terminal: true
    phase: closed
  cancelled:
    terminal: true
    phase: closed
transitions:
  - class: advance
    from: draft
    to: queued
  - class: advance
    from: queued
    to: planning
  - class: advance
    from: planning
    to: plan-input
  - class: advance
    from: planning
    to: plan-ready
  - class: rework
    from: plan-input
    to: queued
  - class: advance
    from: plan-ready
    to: ready
  - class: rework
    from: plan-ready
    to: queued
  - class: advance
    from: ready
    to: in-dev
  - class: advance
    from: in-dev
    to: in-review
  - class: rework
    from: in-review
    to: ready
  - class: advance
    from: in-review
    to: uat-test
  - class: advance
    from: uat-test
    to: deployment-ready
  - class: rework
    from: uat-test
    to: queued
  - class: advance
    from: deployment-ready
    to: deploying
  - class: advance
    from: deploying
    to: deployment-testing
  - class: exit
    from: deployment-testing
    to: completed
  - class: rework
    from: deployment-testing
    to: deployment-failure
  - class: rework
    from: deployment-failure
    to: ready
  - class: rework
    from: deployment-failure
    to: queued
  - class: exit
    from:
      - draft
      - queued
      - planning
      - plan-input
      - plan-ready
      - ready
      - in-dev
      - in-review
      - uat-test
      - deployment-ready
      - deployment-failure
    to: deferred
  - class: exit
    from:
      - draft
      - queued
      - planning
      - plan-input
      - plan-ready
      - ready
      - in-dev
      - in-review
      - uat-test
      - deployment-ready
      - deployment-failure
    to: cancelled
