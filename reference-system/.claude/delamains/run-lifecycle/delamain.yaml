phases:
  - execution
  - closed
states:
  queued:
    initial: true
    phase: execution
    actor: agent
    path: agents/queued.md
    resumable: false
  running:
    phase: execution
    actor: agent
    path: agents/running.md
    resumable: false
  completed:
    terminal: true
    phase: closed
  failed:
    terminal: true
    phase: closed
transitions:
  - class: advance
    from: queued
    to: running
  - class: rework
    from: running
    to: queued
  - class: exit
    from: running
    to: completed
  - class: exit
    from: running
    to: failed
