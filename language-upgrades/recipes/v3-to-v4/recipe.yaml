schema: als-language-upgrade-recipe@1
from:
  als_version: 3
to:
  als_version: 4
summary: Insert Delamain state labels and terminal outcomes, then flip the system to ALS v4.
steps:
  - id: generate-state-labels-and-outcomes
    title: Insert Delamain placeholder labels and terminal outcomes
    type: script
    category: must-run
    depends_on: []
    preconditions:
      - als-version-matches-from
      - validates-as-from-version
    postconditions:
      - als-version-matches-to
      - validates-as-to-version
    trigger: auto
    path: scripts/generate-state-labels-and-outcomes.sh
    args: []
